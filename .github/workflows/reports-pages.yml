name: Reports Index

on:
  push:
    branches: [main]
    paths:
      - 'reports/**'
      - 'tools/generate_pages.py'
      - 'tools/lang_config.py'
      - 'reports-browser/marked.min.js'
      - 'reports-browser/dompurify.min.js'
      - '.github/workflows/reports-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: reports-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'
      - name: Generate report index
        run: python tools/generate_pages.py
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages
          full_commit_message: 'docs: refresh report index'
