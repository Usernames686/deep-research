<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' data: blob:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; object-src 'none'; base-uri 'none'; form-action 'none'">
<title>Deep Research Reports</title><link rel="icon" href="favicon.svg"><style>
:root{--fg:#1f2328;--bg:#fff;--canvas:#f6f8fa;--border:#d0d7de;--accent:#0969da;--muted:#656d76;--green:#1a7f37;--orange:#9a6700;--font:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans",sans-serif;--mono:ui-monospace,SFMono-Regular,Menlo,monospace}
*{box-sizing:border-box}body{margin:0;font-family:var(--font);color:var(--fg);background:var(--bg);line-height:1.5}.w{max-width:1100px;margin:auto;padding:24px 16px}h1{font-size:24px;margin:0}.sub{color:var(--muted);margin:4px 0 20px}.filters{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}input,select{border:1px solid var(--border);border-radius:5px;padding:7px 10px;background:var(--bg)}input{flex:1;min-width:220px}.lc{border:1px solid var(--border);border-radius:16px;background:var(--bg);padding:4px 10px;margin:0 4px 8px 0;cursor:pointer}.lc.s{background:var(--accent);color:#fff;border-color:var(--accent)}.lc span{font-size:11px;color:var(--muted)}.table{border:1px solid var(--border);border-radius:6px;overflow:hidden}table{width:100%;border-collapse:collapse;font-size:14px}th,td{padding:8px 12px;text-align:left;border-bottom:1px solid var(--border)}th{background:var(--canvas);cursor:pointer}tr:last-child td{border-bottom:0}.tc a{color:var(--accent);text-decoration:none;font-weight:500}.n,.m{font-family:var(--mono);font-size:12px;color:var(--muted)}.mb{font-size:11px;font-weight:600}.mb-quick{color:var(--green)}.mb-standard{color:var(--accent)}.mb-deep{color:var(--orange)}.hidden{display:none}.pg,.foot{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:10px;color:var(--muted);font-size:12px}
@media(max-width:700px){.w{padding:16px 8px}thead{display:none}tbody tr{display:block;padding:10px;border-bottom:1px solid var(--border)}td{display:block;border:0;padding:3px}td.n{display:none}}
</style></head><body><main class="w">
<h1>Deep Research Reports</h1><p class="sub">Browse all generated reports</p><div><button class="lc" data-lc="zh" onclick="fc(this)">中文 <span>1</span></button></div>
<div class="filters"><input id="q" placeholder="Search reports" oninput="filterRows()"><select id="l" onchange="filterRows()"><option value="">All languages</option><option value="zh">中文</option></select><select id="m" onchange="filterRows()"><option value="">All depths</option><option value="deep">Deep</option></select><span id="count">1 reports</span></div>
<div class="table"><table><thead><tr><th>#</th><th onclick="sortRows(1)">Report</th><th onclick="sortRows(2)">Language</th><th onclick="sortRows(3)">Depth</th><th onclick="sortRows(4)">Words</th><th onclick="sortRows(5)">Sources</th><th onclick="sortRows(6)">Date</th></tr></thead><tbody id="b"><tr data-lang="zh" data-mode="deep" data-word="41925" data-sources="19" data-date="2026-07-21" data-rid="0" data-src=""><td class="n">1</td><td class="tc"><a href="https://github.com/Usernames686/deep-research/blob/main/reports/zh/Agent%20%E6%8A%80%E6%9C%AF%E4%B8%93%E9%A2%98%E6%B7%B1%E5%BA%A6%E7%A0%94%E7%A9%B6%EF%BC%9A%E6%9E%B6%E6%9E%84%E8%8C%83%E5%BC%8F%E3%80%81%E5%B7%A5%E7%A8%8B%E6%A0%88%E3%80%81%E5%AE%89%E5%85%A8%E6%B2%BB%E7%90%86%E4%B8%8E%E7%94%9F%E6%80%81%E6%BC%94%E8%BF%9B-20260721-181215.md" target="_blank" rel="noopener noreferrer">Agent 技术专题深度研究：架构范式、工程栈、安全治理与生态演进</a></td><td>中文</td><td><span class="mb mb-deep">Deep</span></td><td class="m">4.2w</td><td class="m">19</td><td class="m">2026-07-21</td></tr></tbody></table></div>
<div class="pg"><span id="page-info"></span><span><button onclick="page(-1)">Prev</button> <button onclick="page(1)">Next</button></span></div>
<footer class="foot"><span>Last updated: 2026-07-21 17:18 UTC</span><a href="https://github.com/hoolulu/deep-research" rel="noopener noreferrer">deep-research</a></footer>
</main><script>
var ROWS=Array.from(document.querySelectorAll('#b tr')),PAGE=1,SIZE=20,DIR={};
ROWS.forEach(function(r){r.dataset.match='1'});
function filterRows(){var q=document.getElementById('q').value.toLowerCase(),l=document.getElementById('l').value,m=document.getElementById('m').value,n=0;ROWS.forEach(function(r){var ok=(!q||r.querySelector('a').textContent.toLowerCase().includes(q))&&(!l||r.dataset.lang===l)&&(!m||r.dataset.mode===m);r.dataset.match=ok?'1':'0';if(ok)n++});document.getElementById('count').textContent=n+' reports';PAGE=1;renderPage()}
function fc(button){document.querySelectorAll('.lc').forEach(function(x){x.classList.toggle('s',x===button)});document.getElementById('l').value=button.dataset.lc;filterRows()}
function sortRows(column){DIR[column]=DIR[column]===1?-1:1;ROWS.sort(function(a,b){var x=a.children[column].textContent.trim(),y=b.children[column].textContent.trim();if(column===4){x=Number(a.dataset.word);y=Number(b.dataset.word)}else if(column===5){x=Number(a.dataset.sources);y=Number(b.dataset.sources)}else if(column===6){x=a.dataset.date;y=b.dataset.date}return (typeof x==='number'?x-y:x.localeCompare(y))*DIR[column]});ROWS.forEach(function(r){document.getElementById('b').appendChild(r)});renderPage()}
function renderPage(){var matched=ROWS.filter(function(r){return r.dataset.match==='1'}),pages=Math.max(1,Math.ceil(matched.length/SIZE));PAGE=Math.max(1,Math.min(PAGE,pages));ROWS.forEach(function(r){r.classList.add('hidden')});matched.slice((PAGE-1)*SIZE,PAGE*SIZE).forEach(function(r){r.classList.remove('hidden')});document.getElementById('page-info').textContent='Page '+PAGE+' of '+pages}
function page(delta){PAGE+=delta;renderPage()}renderPage();
</script></body></html>
